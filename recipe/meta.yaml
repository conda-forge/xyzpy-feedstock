{% set version = "1.3.0" %}

package:
  name: xyzpy
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/x/xyzpy/xyzpy-{{ version }}.tar.gz
  sha256: 397892b6d6d457aa8c57cfbb610bf03435b049bba5a9c079ee9a63039074844b

build:
  entry_points:
    - xyzpy-grow = xyzpy.gen.xyzpy_grow_cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.10
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=3.10
    - dask-core
    - h5netcdf
    - h5py
    - joblib
    - numpy
    - pandas
    - tqdm
    - xarray

test:
  imports:
    - xyzpy
  commands:
    - pip check
    - xyzpy-grow --help
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/xyzpy/
  summary: Easily generate large parameter space data
  doc_url: https://xyzpy.readthedocs.io/
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jcmgray